<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitLog — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --charcoal: #141414;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --green: #b8f94f;
    --text: #e8e8e8;
    --muted: #777;
    --red: #ff5252;
    --blue: #4fa8ff;
  }

  body {
    background: var(--black);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(ellipse at 20% 80%, rgba(184,249,79,0.05) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 20%, rgba(184,249,79,0.03) 0%, transparent 50%);
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    background: var(--charcoal);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 5px;
    color: var(--green);
    margin-bottom: 4px;
  }

  .logo span { color: var(--text); }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .auth-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 28px;
  }

  .field-group {
    margin-bottom: 18px;
    position: relative;
  }

  .field-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 600;
  }

  .field-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 40px 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(184,249,79,0.1);
  }

  .field-icon {
    position: absolute;
    right: 14px;
    bottom: 13px;
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  .forgot-link {
    text-align: right;
    margin-top: -8px;
    margin-bottom: 24px;
    font-size: 12px;
  }

  .forgot-link a {
    color: var(--blue);
    text-decoration: none;
  }

  .btn-main {
    width: 100%;
    background: var(--green);
    border: none;
    color: var(--black);
    padding: 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
    transition: opacity 0.2s;
  }

  .btn-main:hover { opacity: 0.9; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    color: var(--muted);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .oauth-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .btn-oauth {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
  }

  .btn-oauth:hover { border-color: var(--muted); }

  .switch-link {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }

  .switch-link a { color: var(--green); text-decoration: none; font-weight: 600; }
  .switch-link a:hover { text-decoration: underline; }

  .error-box {
    display: none;
    padding: 12px 14px;
    background: rgba(255,82,82,0.08);
    border: 1px solid rgba(255,82,82,0.25);
    border-radius: 8px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div class="auth-card">
  <div class="logo">FIT<span>LOG</span></div>
  <div class="tagline">Track your lifts. Own your progress.</div>

  <div class="auth-title">Welcome Back</div>

  <div class="error-box" id="error-box">
    Invalid email or password. Please try again.
  </div>

  <form id="login-form" onsubmit="return false;">
    <div class="field-group">
      <label class="field-label" for="email">Email Address</label>
      <input class="field-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
      <span class="field-icon">✉</span>
    </div>

    <div class="field-group">
      <label class="field-label" for="password">Password</label>
      <input class="field-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      <span class="field-icon">🔒</span>
    </div>

    <div class="forgot-link">
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn-main" type="submit" onclick="handleLogin()">Sign In</button>
  </form>

  <div class="divider">or continue with</div>

  <div class="oauth-row">
    <button class="btn-oauth">G &nbsp; Google</button>
    <button class="btn-oauth">&#128025; &nbsp; GitHub</button>
  </div>

  <div class="switch-link">
    Don't have an account? <a href="register.html">Create one &rarr;</a>
  </div>
</div>

<script>
  function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('error-box');

    if (!email || !password) {
      errorBox.textContent = 'Please enter your email and password.';
      errorBox.style.display = 'block';
      return;
    }

    // Redirect to home (no real auth)
    window.location.href = 'home.html';
  }
</script>

</body>
</html>
